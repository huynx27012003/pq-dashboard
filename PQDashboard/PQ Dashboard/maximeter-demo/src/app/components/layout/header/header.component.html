<mat-toolbar class="app-header">
    <div class="header-left">
        <button mat-icon-button (click)="onMenuToggle()" class="menu-toggle" matTooltip="Toggle Menu">
            <mat-icon>menu</mat-icon>
        </button>

        <div class="header-title-container">
            <span class="header-title">{{ pageTitle }}</span>
        </div>
    </div>

    <div class="header-right">
        <!-- User Menu -->
        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-button" matTooltip="Account">
            <mat-icon>account_circle</mat-icon>
        </button>

        <mat-menu #userMenu="matMenu" xPosition="before">
            <div class="user-info" *ngIf="currentUser$ | async as user">
                <div class="user-name">{{ user.fullName }}</div>
                <div class="user-role">{{ user.role === 'admin' ? 'Administrator' : 'User' }}</div>
            </div>
            <mat-divider></mat-divider>
            <button mat-menu-item routerLink="/account">
                <mat-icon>person</mat-icon>
                <span>Account Settings</span>
            </button>
            <button mat-menu-item (click)="logout()">
                <mat-icon>logout</mat-icon>
                <span>Logout</span>
            </button>
        </mat-menu>
    </div>
</mat-toolbar>
